esphome:
  name: s3-door
  friendly_name: s3_door

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: ERROR
  baud_rate: 0   # UART logging aus

api:
  encryption:
    key: "wnUh64EnhHpkiE8wpGOUlOcuHVY1KrMOALaWBoIL7JA="
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "706a0abc3d4c85282c91131ff6d0f7a1"

wifi:
  ssid: "WIFI-AP_NAME"
  password: "AP_PASS"
  power_save_mode: none
  fast_connect: true
  reboot_timeout: 0s
  # Wichtig: Kein AP-Fallback, kein captive_portal (Overhead + Fehlerquelle)

  manual_ip:
    static_ip: 192.168.1.175
    gateway: 192.168.1.1
    subnet: 255.255.255.0

# Kamera Webserver (nur das behalten)
esp32_camera_web_server:
  - port: 8080
    mode: stream
  - port: 8081
    mode: snapshot

# dedizierter I2C Bus für die Kamera (SCCB)
i2c:
  - id: cam_i2c
    sda: GPIO4
    scl: GPIO5
    scan: false

esp32_camera:
  name: "S3 Door Camera"

  external_clock:
    pin: GPIO15
    frequency: 20MHz

  i2c_id: cam_i2c

  data_pins: [GPIO11, GPIO9, GPIO8, GPIO10, GPIO12, GPIO18, GPIO17, GPIO16]
  vsync_pin: GPIO6
  href_pin: GPIO7
  pixel_clock_pin: GPIO13
  power_down_pin: GPIO14

  resolution: 640x480

  # Stabilität = Datenrate runter
  jpeg_quality: 22      # mehr Kompression -> weniger WLAN Stress
  max_framerate: 5 fps  # konservativ; ggf. 8 fps wenn stabil

  #fb_count: 2           # falls deine ESPHome-Version das kennt; sonst weglassen
